<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Departamentos — Dakar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F8FA;--bg2:#FFFFFF;--bg3:#EEF0F6;--border:#E2E5EE;
  --text:#141820;--muted:#6B7280;--muted2:#9CA3AF;
  --detal:#0F766E;--taller:#92400E;--ml:#1D4ED8;--ap:#6D28D9;
  --green:#059669;--red:#DC2626;--yellow:#D97706;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;}
.shell{max-width:1140px;margin:0 auto;padding:2rem 1.5rem 5rem;}

/* Header */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:1.5rem;border-bottom:2px solid var(--border);margin-bottom:2rem;gap:1rem;flex-wrap:wrap;}
.hdr-left h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.hdr-left p{font-size:12px;color:var(--muted);margin-top:3px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.period-sel{display:flex;align-items:center;gap:8px;}
.period-sel label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.period-sel select{font-size:13px;font-weight:500;padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);cursor:pointer;outline:none;}
.updated{font-size:11px;color:var(--muted);text-align:right;line-height:1.8;}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--detal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-size:13px;color:var(--muted);}
#error-msg{display:none;padding:3rem;text-align:center;color:var(--red);}

/* Metrics */
.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:2rem;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;}
.metric-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.metric-value{font-size:18px;font-weight:700;line-height:1.2;word-break:break-word;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.metric-dev{font-size:11px;margin-top:3px;font-weight:500;}
.metric-dev.ok{color:var(--green);}
.metric-dev.warn{color:var(--red);}

/* Tabs */
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:1.75rem;flex-wrap:wrap;}
.tab{font-size:13px;font-weight:500;padding:8px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);font-weight:700;border-bottom-color:var(--text);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.sec-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:1.75rem 0 .75rem;}

/* Tables */
.tbl-wrap{overflow-x:auto;margin-bottom:1.5rem;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--bg3);color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:7px 12px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;}
.tbl td:first-child{text-align:left;font-weight:500;}
.tbl tr:hover td{background:var(--bg3);}
.tbl .total-row td{background:var(--bg3);font-weight:700;border-top:2px solid var(--border);}
.tbl .zero{color:var(--border);}
.tbl .subtotal td{background:#F0FDF4;font-weight:600;border-top:1px solid #BBF7D0;color:var(--detal);}

/* Semáforo */
.sem-verde{color:var(--green);font-weight:600;}
.sem-rojo{color:var(--red);font-weight:600;}
.sem-ok::before{content:'🟢 ';}
.sem-warn::before{content:'🔴 ';}

/* Charts */
.chart-wrap{position:relative;width:100%;height:240px;margin-bottom:1.5rem;}

/* Seguimiento */
.sem-blk{margin-bottom:1.75rem;}
.sem-hdr{display:flex;align-items:baseline;gap:10px;padding:.6rem 1rem;background:var(--bg3);border-radius:8px;margin-bottom:.5rem;flex-wrap:wrap;}
.sem-hdr strong{font-size:13px;}
.sem-hdr span{font-size:12px;color:var(--muted);}
.sem-hdr .sem-tot{margin-left:auto;font-size:13px;font-weight:700;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:2px;}

/* Devoluciones */
.dev-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.dev-badge.ok{background:#D1FAE5;color:#065F46;}
.dev-badge.warn{background:#FEE2E2;color:#991B1B;}

/* Detailing / Audio cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1.5rem;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;}
.card-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.card-value{font-size:16px;font-weight:700;}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px;}

@media(max-width:600px){
  .metric-row{grid-template-columns:repeat(2,1fr);}
  .hdr{flex-direction:column;}
  .hdr-right{align-items:flex-start;}
}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-left">
      <h1>Reporte de Departamentos</h1>
      <p>Multiservicios Dakar C.A.</p>
    </div>
    <div class="hdr-right">
      <div class="period-sel">
        <label>Período</label>
        <select id="mesSelect" onchange="cambiarMes()"><option>Cargando...</option></select>
      </div>
      <div class="updated" id="updatedLbl"></div>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div><p>Cargando datos...</p></div>
  <div id="error-msg"></div>
  <div id="app" style="display:none;"></div>
</div>

<script>
const DATA_URL = 'https://script.google.com/macros/s/AKfycbzLm7GcrRP8V6nkCkJ7hC6r58GcqlPRqjL1MTV2YIplRtbaB7QdZt1tv6VoFVwZWXAR/exec';

const CATS = ['Detal','Taller','ML','AutoParts'];
const CAT_LABEL = {Detal:'Detal',Taller:'Taller',ML:'Mercado Libre',AutoParts:'AutoParts'};
const CAT_COLOR = {Detal:'#0F766E',Taller:'#92400E',ML:'#1D4ED8',AutoParts:'#6D28D9'};
const MESES_ES = {'01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'};

let ALL_DATA = null;

const fmt = v => '$' + parseFloat(v||0).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = v => { const n=parseFloat(v||0); return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+Math.round(n/1000)+'K':'$'+Math.round(n); };
const pct = (a,b) => b>0 ? ((a/b)*100).toFixed(1)+'%' : '—';

function catTotal(porMes, mes, cat) {
  const vends = (porMes[mes]||{})[cat]||{};
  return Object.values(vends).reduce((s,v)=>s+v,0);
}

function mesLabel(m) {
  const [y,mo] = m.split('-');
  return (MESES_ES[mo]||mo)+' '+y;
}

function getSemanaDelMes(fechaStr){
  const dt=new Date(fechaStr+'T12:00:00');
  const dow=dt.getDay();
  if(dow===0)return null;
  const year=dt.getFullYear(),month=dt.getMonth(),dia=dt.getDate();
  const primerDow=new Date(year,month,1).getDay();
  let primerSab;
  if(primerDow===0) primerSab=7;
  else if(primerDow===6) primerSab=1;
  else primerSab=1+(6-primerDow);
  if(dia<=primerSab)return 1;
  const primerLunesSem2=primerSab+2;
  return 2+Math.floor((dia-primerLunesSem2)/7);
}

function getRangoSem(sem, year, month){
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const diasEnMes=new Date(year,month+1,0).getDate();
  let min=99,max=0;
  for(let d=1;d<=diasEnMes;d++){
    const fs=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(getSemanaDelMes(fs)===sem){min=Math.min(min,d);max=Math.max(max,d);}
  }
  const f0=new Date(year,month,min),f1=new Date(year,month,max);
  return `${f0.getDate()} ${m[f0.getMonth()]} – ${f1.getDate()} ${m[f1.getMonth()]}`;
}

const diasEs={'Mon':'Lun','Tue':'Mar','Wed':'Mié','Thu':'Jue','Fri':'Vie','Sat':'Sáb'};
const makeLabel=f=>{const dt=new Date(f+'T12:00:00');return(diasEs[dt.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)]||'?')+' '+dt.getDate();};

let charts = [];
function destroyCharts(){ charts.forEach(c=>{try{c.destroy();}catch(e){}}); charts=[]; }

// ── Plugins ──────────────────────────────────────────────────
const totalLabels = {
  id:'totalLabels',
  afterDatasetsDraw(chart){
    if(!chart.config.options._totales)return;
    const{ctx}=chart; const tots=chart.config.options._totales;
    const nDs=chart.data.datasets.length;
    ctx.save();ctx.font='600 11px DM Sans,sans-serif';ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#141820';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    tots.forEach((tot,i)=>{
      if(!tot)return;
      let topY=Infinity;
      for(let di=0;di<nDs;di++){const m=chart.getDatasetMeta(di);if(m.data[i]&&m.data[i].y<topY)topY=m.data[i].y;}
      ctx.fillText(fmtK(tot),chart.getDatasetMeta(0).data[i].x,topY-5);
    });
    ctx.restore();
  }
};

const segPct = {
  id:'segPct',
  afterDatasetsDraw(chart){
    if(!chart.config.options._totales)return;
    const{ctx}=chart; const tots=chart.config.options._totales;
    ctx.save();
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((bar,bi)=>{
        const v=ds.data[bi]; if(!v||v<1)return;
        const p=Math.round(v/tots[bi]*100); if(p<6)return;
        const h=bar.height||0; if(h<18)return;
        ctx.font='500 10px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,0.9)';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(p+'%',bar.x,bar.y+h/2);
      });
    });
    ctx.restore();
  }
};
Chart.register(totalLabels,segPct);

function buildStackedBar(id,legId,diasData,vendedores,colors,year,month){
  const el=document.getElementById(id); if(!el)return;
  const fechas=Object.keys(diasData).sort();
  const labels=fechas.map(makeLabel);
  const tots=fechas.map(f=>Object.values(diasData[f]).reduce((a,b)=>a+b,0));
  const activeV=vendedores.filter(v=>fechas.some(f=>diasData[f][v]>0));
  const datasets=activeV.map((v,vi)=>({
    label:v, data:fechas.map(f=>diasData[f][v]||0),
    backgroundColor:colors[vi%colors.length], borderRadius:2, stack:'s'
  }));
  const legEl=document.getElementById(legId);
  if(legEl) legEl.innerHTML=activeV.map((v,vi)=>`<span class="legend-item"><span class="legend-dot" style="background:${colors[vi%colors.length]};"></span>${v}</span>`).join('');
  el.parentElement.style.height=Math.max(180,fechas.length>5?240:200)+'px';
  const c=new Chart(el,{
    plugins:[totalLabels,segPct],
    data:{labels,datasets},
    options:{_totales:tots,responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:22}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;if(!v)return null;return`${ctx.dataset.label}: ${fmt(v)} (${(v/tots[ctx.dataIndex]*100).toFixed(1)}%)`;
      }}}},
      scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#6B7280',font:{size:11}}},
              y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'},beginAtZero:true,ticks:{color:'#6B7280',font:{size:11},callback:v=>fmtK(v)}}}}
  });
  charts.push(c);
}

// ── Render ────────────────────────────────────────────────────
function render(mes){
  destroyCharts();
  const D = ALL_DATA;
  const porMes = D.porMes||{};
  const devMap = D.devMap||{};
  const marcas = D.marcas||{};
  const detailing = D.detailing||{};
  const audio = D.audio||{};
  const seg = D.seguimiento||{};

  const [y,mo] = mes.split('-');
  const year=+y, month=+mo-1;

  // Totales por cat
  const totCat={};
  CATS.forEach(c=>{ totCat[c]=catTotal(porMes,mes,c); });
  const totalGeneral=CATS.reduce((s,c)=>s+totCat[c],0);

  // Devoluciones por cat
  const devCat={};
  CATS.forEach(c=>{ devCat[c]=devMap[mes+'|CAT|'+c]||0; });
  const devTotal=devMap[mes]||0;

  // Neto real
  const netoCat={};
  CATS.forEach(c=>{ netoCat[c]=totCat[c]-(devCat[c]||0); });

  // Actualizar label
  document.getElementById('updatedLbl').innerHTML=
    `Actualizado: ${new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'})}<br><strong>Total: ${fmt(totalGeneral)}</strong>`;

  let html = `
  <div class="metric-row">
    ${CATS.map(c=>{
      const pctDev = totCat[c]>0 ? (devCat[c]/totCat[c]*100).toFixed(1) : '0.0';
      const devOk = parseFloat(pctDev)<=3;
      return `<div class="metric">
        <div class="metric-label">${CAT_LABEL[c]}</div>
        <div class="metric-value" style="color:${CAT_COLOR[c]}">${fmt(netoCat[c])}</div>
        <div class="metric-sub">Facturado: ${fmt(totCat[c])}</div>
        ${devCat[c]>0?`<div class="metric-dev ${devOk?'ok':'warn'}">Dev: -${fmt(devCat[c])} (${pctDev}%)</div>`:''}
      </div>`;
    }).join('')}
    <div class="metric">
      <div class="metric-label">Total neto</div>
      <div class="metric-value">${fmt(CATS.reduce((s,c)=>s+netoCat[c],0))}</div>
      <div class="metric-sub">Facturado: ${fmt(totalGeneral)}</div>
      ${devTotal>0?`<div class="metric-dev ${(devTotal/totalGeneral*100)<=3?'ok':'warn'}">Dev: -${fmt(devTotal)} (${(devTotal/totalGeneral*100).toFixed(1)}%)</div>`:''}
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('resumen',this)">Resumen</button>
    <button class="tab" onclick="switchTab('marcas',this)">Marcas</button>
    <button class="tab" onclick="switchTab('detailing',this)">Detailing</button>
    <button class="tab" onclick="switchTab('audio',this)">CarAudio</button>
    <button class="tab" onclick="switchTab('seguimiento',this)">Seguimiento Diario</button>
    <button class="tab" onclick="switchTab('devoluciones',this)">Devoluciones</button>
  </div>`;

  // ── TAB: RESUMEN ──
  html+=`<div class="tab-panel active" id="panel-resumen">`;
  CATS.forEach(cat=>{
    const vends = (porMes[mes]||{})[cat]||{};
    if(!Object.keys(vends).length) return;
    const devTotCat = devCat[cat]||0;
    const rows = Object.entries(vends).sort((a,b)=>b[1]-a[1]);
    html+=`<div class="sec-title">${CAT_LABEL[cat]}</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr>
        <th>Vendedor</th><th>Facturado</th><th>Devuelto</th><th>% Dev</th><th>Neto</th>
      </tr></thead><tbody>`;
    rows.forEach(([vend,neto])=>{
      const dev = devMap[mes+'|'+vend]||0;
      const neto_real = neto-dev;
      const pDev = neto>0?(dev/neto*100).toFixed(1):0;
      const semOk = parseFloat(pDev)<=3;
      html+=`<tr>
        <td>${vend}</td>
        <td>${fmt(neto)}</td>
        <td>${dev>0?`<span class="sem-${semOk?'verde':'rojo'}">${fmt(dev)}</span>`:`<span class="zero">—</span>`}</td>
        <td>${dev>0?`<span class="dev-badge ${semOk?'ok':'warn'}">${pDev}%</span>`:`<span class="zero">—</span>`}</td>
        <td style="font-weight:600;">${fmt(neto_real)}</td>
      </tr>`;
    });
    const tot_fac=rows.reduce((s,r)=>s+r[1],0);
    const tot_neto=tot_fac-devTotCat;
    html+=`<tr class="total-row"><td>Total ${CAT_LABEL[cat]}</td><td>${fmt(tot_fac)}</td>
      <td>${fmt(devTotCat)}</td>
      <td>${tot_fac>0?`<span class="dev-badge ${(devTotCat/tot_fac*100)<=3?'ok':'warn'}">${(devTotCat/tot_fac*100).toFixed(1)}%</span>`:'—'}</td>
      <td>${fmt(tot_neto)}</td></tr>`;
    html+=`</tbody></table></div>`;
  });
  html+=`</div>`;

  // ── TAB: MARCAS ──
  const marcasMes = marcas[mes]||{};
  html+=`<div class="tab-panel" id="panel-marcas">`;
  html+=`<div class="sec-title">Marcas por vendedor — ${mesLabel(mes)}</div>`;
  html+=`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Vendedor</th><th>Marca</th><th>Facturado</th></tr></thead><tbody>`;
  const allVends = Object.keys(marcasMes).sort((a,b)=>{
    const ta=Object.values(marcasMes[a]).reduce((s,v)=>s+v,0);
    const tb=Object.values(marcasMes[b]).reduce((s,v)=>s+v,0);
    return tb-ta;
  });
  allVends.forEach(vend=>{
    const vm=marcasMes[vend];
    const vendTotal=Object.values(vm).reduce((s,v)=>s+v,0);
    const topMarcas=Object.entries(vm).sort((a,b)=>b[1]-a[1]);
    let first=true;
    topMarcas.forEach(([marca,neto])=>{
      if(neto<1)return;
      html+=`<tr>
        <td style="color:var(--muted);font-size:12px;">${first?`<strong style="color:var(--text);">${vend}</strong><br><span style="font-size:10px;">Total: ${fmt(vendTotal)}</span>`:''}` ;
      first=false;
      html+=`</td><td>${marca}</td><td>${fmt(neto)}</td></tr>`;
    });
  });
  html+=`</tbody></table></div></div>`;

  // ── TAB: DETAILING ──
  const detMes = detailing[mes]||{tipo:{},instalador:{}};
  html+=`<div class="tab-panel" id="panel-detailing">`;
  html+=`<div class="sec-title">Por tipo de servicio</div>`;
  const tipoLabels={PPF:'PPF',Ceramico:'Cerámico',PapelAhumado:'Papel Ahumado',Instalacion:'Instalación',Producto:'Producto'};
  html+=`<div class="card-grid">`;
  Object.entries(detMes.tipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,neto])=>{
    html+=`<div class="card">
      <div class="card-label">${tipoLabels[tipo]||tipo}</div>
      <div class="card-value">${fmt(neto)}</div>
    </div>`;
  });
  html+=`</div>`;
  const totalDet=Object.values(detMes.tipo).reduce((s,v)=>s+v,0);
  if(totalDet>0){
    html+=`<div class="sec-title">Por instalador</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Instalador</th><th>Monto</th><th>% del total</th></tr></thead><tbody>`;
    const instLabels={'INST-ALEX':'Alexander Pérez (Papel Ahumado)','INST-CDIN':'Carlos Dinis (Cerámico)','INST-ANTH':'Anthony Cárdenas (PPF/Cerámico)'};
    Object.entries(detMes.instalador).sort((a,b)=>b[1]-a[1]).forEach(([inst,neto])=>{
      html+=`<tr><td>${instLabels[inst]||inst}</td><td>${fmt(neto)}</td><td>${(neto/totalDet*100).toFixed(1)}%</td></tr>`;
    });
    html+=`<tr class="total-row"><td>Total Detailing</td><td>${fmt(totalDet)}</td><td>100%</td></tr>`;
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  // ── TAB: AUDIO ──
  const audioMes = audio[mes]||{};
  html+=`<div class="tab-panel" id="panel-audio">`;
  html+=`<div class="sec-title">CarAudio por marca — ${mesLabel(mes)}</div>`;
  html+=`<div class="card-grid">`;
  Object.entries(audioMes).sort((a,b)=>b[1]-a[1]).forEach(([marca,neto])=>{
    html+=`<div class="card">
      <div class="card-label">${marca}</div>
      <div class="card-value">${fmt(neto)}</div>
      <div class="card-sub">${(neto/Object.values(audioMes).reduce((s,v)=>s+v,0)*100).toFixed(1)}% del total audio</div>
    </div>`;
  });
  html+=`</div>`;
  const totalAudio=Object.values(audioMes).reduce((s,v)=>s+v,0);
  html+=`<div class="metric" style="max-width:200px;margin-bottom:1rem;"><div class="metric-label">Total CarAudio</div><div class="metric-value">${fmt(totalAudio)}</div></div>`;
  html+=`</div>`;

  // ── TAB: SEGUIMIENTO ──
  const segMes = seg[mes]||{};
  const VEND_COL={'Carlos Pellico':'Detal','Kimex Azpirichaga':'Detal','Karina Hernandez':'Detal',
    'Carlos Santana':'Detal','Gustavo Urdaneta':'Detal','Santana Carlos':'Detal','Fernando Araujo':'Detal',
    'CRM Detal':'Detal','Joel - Tienda':'Detal','Jonathan Chacon':'Detal',
    'Frank':'Taller','Roger':'Taller',
    'Mercado Libre':'ML','ML Adicional':'ML',
    'CRM AutoParts':'AutoParts','Edgar Quiros':'AutoParts','Daniel AutoParts':'AutoParts'};
  const SEG_COLS=['Detal','Taller','ML','AutoParts'];
  const SEG_COLORS={Detal:'#0F766E',Taller:'#92400E',ML:'#1D4ED8',AutoParts:'#6D28D9'};
  const fechasSeg=Object.keys(segMes).sort();
  const bySem={};
  fechasSeg.forEach(f=>{
    const s=getSemanaDelMes(f); if(!s)return;
    if(!bySem[s])bySem[s]=[];
    bySem[s].push(f);
  });

  html+=`<div class="tab-panel" id="panel-seguimiento">`;
  html+=`<div class="tbl-wrap">`;
  Object.entries(bySem).sort((a,b)=>+a[0]-+b[0]).forEach(([sem,fechas])=>{
    const rango=getRangoSem(+sem,year,month);
    const semTots={};SEG_COLS.forEach(c=>semTots[c]=0);
    html+=`<div class="sem-blk">
      <div class="sem-hdr">
        <strong>Semana ${sem}</strong>
        <span>${rango}</span>
        <span class="sem-tot">${fmt(fechas.reduce((s,f)=>s+SEG_COLS.reduce((ss,c)=>ss+(segMes[f]?.[c]||0),0),0))}</span>
      </div>
      <table class="tbl">
        <thead><tr>
          <th>Fecha</th>
          ${SEG_COLS.map(c=>`<th style="color:${SEG_COLORS[c]}">${CAT_LABEL[c]}</th>`).join('')}
          <th>Total</th>
        </tr></thead><tbody>`;
    fechas.forEach(f=>{
      const dayTot=SEG_COLS.reduce((s,c)=>s+(segMes[f]?.[c]||0),0);
      SEG_COLS.forEach(c=>semTots[c]+=(segMes[f]?.[c]||0));
      const dt=new Date(f+'T12:00:00');
      const dLbl=(diasEs[dt.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)]||'?')+' '+dt.getDate();
      const mLbl=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][dt.getMonth()];
      html+=`<tr><td>${dLbl} ${mLbl}</td>
        ${SEG_COLS.map(c=>{const v=segMes[f]?.[c]||0;return v>0?`<td>${fmt(v)}</td>`:`<td class="zero">—</td>`;}).join('')}
        <td style="font-weight:600;">${fmt(dayTot)}</td></tr>`;
    });
    const semTot=SEG_COLS.reduce((s,c)=>s+semTots[c],0);
    html+=`<tr class="subtotal">
      <td>Subtotal Sem ${sem}</td>
      ${SEG_COLS.map(c=>`<td>${fmt(semTots[c])}</td>`).join('')}
      <td>${fmt(semTot)}</td>
    </tr></tbody></table></div>`;
  });
  // Total mes
  const mesRowTots={};SEG_COLS.forEach(c=>mesRowTots[c]=0);
  fechasSeg.forEach(f=>SEG_COLS.forEach(c=>mesRowTots[c]+=(segMes[f]?.[c]||0)));
  const mesRowTotal=SEG_COLS.reduce((s,c)=>s+mesRowTots[c],0);
  html+=`<table class="tbl" style="margin-top:4px;">
    <tbody><tr class="total-row">
      <td>TOTAL ${mesLabel(mes).toUpperCase()}</td>
      ${SEG_COLS.map(c=>`<td>${fmt(mesRowTots[c])}</td>`).join('')}
      <td>${fmt(mesRowTotal)}</td>
    </tr></tbody></table>`;
  html+=`</div></div>`;

  // ── TAB: DEVOLUCIONES ──
  html+=`<div class="tab-panel" id="panel-devoluciones">`;
  html+=`<div class="sec-title">Porcentaje de devolución por vendedor — ${mesLabel(mes)}</div>`;
  html+=`<div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Vendedor</th><th>Facturado</th><th>Devuelto</th><th>% Dev</th><th>Meta 3%</th></tr></thead><tbody>`;

  // Recopilar todos los vendedores con ventas
  const allVendsDev = {};
  CATS.forEach(cat=>{
    const vends=(porMes[mes]||{})[cat]||{};
    Object.entries(vends).forEach(([v,n])=>{
      if(!allVendsDev[v])allVendsDev[v]={fac:0,dev:0};
      allVendsDev[v].fac+=n;
      allVendsDev[v].dev+=devMap[mes+'|'+v]||0;
    });
  });

  Object.entries(allVendsDev).sort((a,b)=>b[1].fac-a[1].fac).forEach(([vend,{fac,dev}])=>{
    const p=fac>0?(dev/fac*100).toFixed(1):0;
    const ok=parseFloat(p)<=3;
    html+=`<tr>
      <td>${vend}</td>
      <td>${fmt(fac)}</td>
      <td>${dev>0?fmt(dev):'<span class="zero">—</span>'}</td>
      <td>${dev>0?`<span class="dev-badge ${ok?'ok':'warn'}">${p}%</span>`:'<span class="zero">—</span>'}</td>
      <td>${dev>0?`<span class="${ok?'sem-verde':'sem-rojo'}">${ok?'✅ OK':'⚠️ Alto'}</span>`:'—'}</td>
    </tr>`;
  });

  const totFac=Object.values(allVendsDev).reduce((s,v)=>s+v.fac,0);
  const totDev=Object.values(allVendsDev).reduce((s,v)=>s+v.dev,0);
  const totP=totFac>0?(totDev/totFac*100).toFixed(1):0;
  const totOk=parseFloat(totP)<=3;
  html+=`<tr class="total-row">
    <td>Total</td><td>${fmt(totFac)}</td><td>${fmt(totDev)}</td>
    <td><span class="dev-badge ${totOk?'ok':'warn'}">${totP}%</span></td>
    <td><span class="${totOk?'sem-verde':'sem-rojo'}">${totOk?'✅ OK':'⚠️ Alto'}</span></td>
  </tr>`;
  html+=`</tbody></table></div>`;

  // Nota trimestral
  const mesesDisp=(ALL_DATA.meses||[]).slice().reverse();
  if(mesesDisp.length>=3){
    html+=`<div class="sec-title">Promedio trimestral de devoluciones</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Vendedor</th>
        ${mesesDisp.map(m=>`<th>${mesLabel(m)}</th>`).join('')}
        <th>Promedio</th>
      </tr></thead><tbody>`;
    const allVendsTrims=new Set();
    mesesDisp.forEach(m=>CATS.forEach(c=>Object.keys((ALL_DATA.porMes[m]||{})[c]||{}).forEach(v=>allVendsTrims.add(v))));
    [...allVendsTrims].forEach(vend=>{
      const pcts=mesesDisp.map(m=>{
        const fac=CATS.reduce((s,c)=>s+((ALL_DATA.porMes[m]||{})[c]?.[vend]||0),0);
        const dev=ALL_DATA.devMap[m+'|'+vend]||0;
        return fac>0?(dev/fac*100):null;
      });
      const valid=pcts.filter(p=>p!==null);
      if(!valid.length)return;
      const avg=valid.reduce((s,p)=>s+p,0)/valid.length;
      const avgOk=avg<=3;
      html+=`<tr>
        <td>${vend}</td>
        ${pcts.map(p=>p===null?`<td class="zero">—</td>`:`<td><span class="dev-badge ${p<=3?'ok':'warn'}">${p.toFixed(1)}%</span></td>`).join('')}
        <td><span class="dev-badge ${avgOk?'ok':'warn'}">${avg.toFixed(1)}%</span></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  document.getElementById('app').innerHTML=html;
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function cambiarMes(){
  const mes=document.getElementById('mesSelect').value;
  if(mes&&ALL_DATA)render(mes);
}

async function boot(){
  try{
    const resp=await fetch(DATA_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    ALL_DATA=data;

    const meses=(data.meses||[]);
    if(!meses.length)throw new Error('Sin datos');

    const sel=document.getElementById('mesSelect');
    sel.innerHTML=meses.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');

    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    render(meses[0]);
  }catch(e){
    document.getElementById('loading').style.display='none';
    const el=document.getElementById('error-msg');
    el.style.display='block';
    el.textContent='Error: '+e.message;
  }
}
boot();
</script>
</body>
</html>
