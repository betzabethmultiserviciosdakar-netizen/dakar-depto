<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Ventas Detal — Dakar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F6FA;--bg2:#FFFFFF;--bg3:#EEF0F6;--border:#DDE1ED;
  --text:#1A1D2E;--muted:#6B7080;
  --detal:#0F766E;--taller:#92400E;--ml:#1D4ED8;--ap:#6D28D9;
  --green:#059669;--red:#DC2626;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;}
.shell{max-width:1120px;margin:0 auto;padding:2rem 1.5rem 5rem;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:1.25rem;border-bottom:2px solid var(--border);margin-bottom:2rem;gap:1rem;flex-wrap:wrap;}
.hdr h1{font-size:22px;font-weight:700;}
.hdr p{font-size:13px;color:var(--muted);margin-top:3px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.period-sel{display:flex;align-items:center;gap:8px;}
.period-sel label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.period-sel select{font-size:13px;font-weight:500;padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);cursor:pointer;outline:none;}
.updated{font-size:12px;color:var(--muted);text-align:right;line-height:1.8;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--detal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{color:var(--muted);font-size:13px;}
#err{display:none;padding:3rem;text-align:center;color:var(--red);}
.mrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem;}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;}
.mc-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.mc-val{font-size:16px;font-weight:700;word-break:break-word;line-height:1.3;}
.mc-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.mc-dev{font-size:11px;margin-top:3px;font-weight:500;}
.mc-dev.ok{color:var(--green);}
.mc-dev.warn{color:var(--red);}
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:1.75rem;flex-wrap:wrap;}
.tab{font-size:13px;font-weight:500;padding:8px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);font-weight:700;border-bottom-color:var(--text);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:1.75rem 0 .75rem;}
.tw{overflow-x:auto;margin-bottom:1.5rem;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--bg3);color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:7px 12px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:7px 12px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;}
.tbl td:first-child{text-align:left;font-weight:500;}
.tbl tr:hover td{background:var(--bg3);}
.tbl .tr-tot td{background:var(--bg3);font-weight:700;border-top:2px solid var(--border);}
.tbl .tr-sub td{background:#F0FDF4;font-weight:600;border-top:1px solid #BBF7D0;color:var(--detal);}
.zero{color:var(--border);}
.badge{display:inline-flex;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge.ok{background:#D1FAE5;color:#065F46;}
.badge.warn{background:#FEE2E2;color:#991B1B;}
.sem-blk{margin-bottom:2rem;}
.sem-hdr{display:flex;align-items:baseline;gap:10px;padding:.6rem 1rem;background:var(--bg3);border-radius:8px;margin-bottom:.6rem;flex-wrap:wrap;}
.sem-hdr b{font-size:13px;}
.sem-hdr span{font-size:12px;color:var(--muted);}
.sem-tot{margin-left:auto;font-size:13px;font-weight:700;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
.legend-i{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.legend-d{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;}
.card-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.card-val{font-size:16px;font-weight:700;}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.filter-row label{font-size:12px;font-weight:600;color:var(--muted);}
.filter-row select{font-size:13px;padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);outline:none;cursor:pointer;}
.donut-grid{display:grid;grid-template-columns:240px 1fr;gap:2rem;align-items:center;margin-bottom:1.5rem;}
.donut-legend{display:flex;flex-direction:column;gap:8px;}
.donut-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.donut-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
@media(max-width:600px){
  .mrow{grid-template-columns:repeat(2,1fr);}
  .hdr{flex-direction:column;}
  .hdr-right{align-items:flex-start;}
  .donut-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div><h1>Reporte de Ventas</h1><p>Multiservicios Dakar C.A. — Detal · Taller · ML · AutoParts</p></div>
    <div class="hdr-right">
      <div class="period-sel">
        <label>Periodo</label>
        <select id="mesSelect" onchange="cambiarMes()"><option>Cargando...</option></select>
      </div>
      <div class="updated" id="updLbl"></div>
    </div>
  </div>
  <div id="loading"><div class="spinner"></div><p>Cargando datos...</p></div>
  <div id="err"></div>
  <div id="app" style="display:none;"></div>
</div>
<script>
const DATA_URL='https://script.google.com/macros/s/AKfycbyr2aQl3RP29jwyixaVooukSi8UJz09UwWwQLLsS1jviJm5-sI1sINL1EEWiIvDJ7dD/exec';
const CATS=['Detal','Taller','ML','AutoParts'];
const CAT_LBL={Detal:'Detal',Taller:'Taller',ML:'Mercado Libre',AutoParts:'AutoParts'};
const CAT_COL={Detal:'#0F766E',Taller:'#92400E',ML:'#1D4ED8',AutoParts:'#6D28D9'};
const CAT_SHADES={
  Detal:['#064E3B','#0F766E','#0D9488','#14B8A6','#2DD4BF','#5EEAD4','#99F6E4','#CCFBF1','#F0FDFA'],
  Taller:['#78350F','#92400E','#B45309'],
  ML:['#1E3A8A','#1D4ED8','#2563EB','#3B82F6'],
  AutoParts:['#4C1D95','#6D28D9','#7C3AED','#8B5CF6']
};
const MESES_ES={'01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre'};
const diasEs={'Mon':'Lun','Tue':'Mar','Wed':'Mié','Thu':'Jue','Fri':'Vie','Sat':'Sáb'};
let D=null;
let CHARTS=[];
const fmt=v=>'$'+parseFloat(v||0).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK=v=>{const n=parseFloat(v||0);return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1000?'$'+Math.round(n/1000)+'K':'$'+Math.round(n);};
const makeLabel=f=>{const dt=new Date(f+'T12:00:00');return(diasEs[dt.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)]||'?')+' '+dt.getDate();};
const mesLabel=m=>{const[y,mo]=m.split('-');return(MESES_ES[mo]||mo)+' '+y;};
const segVal=(mes,f,cat)=>D.seguimiento?.[mes]?.[f]?.cat?.[cat]||0;

function getSemanaDelMes(f){
  const dt=new Date(f+'T12:00:00');
  const dow=dt.getDay();if(dow===0)return null;
  const y=dt.getFullYear(),mo=dt.getMonth(),d=dt.getDate();
  const p=new Date(y,mo,1).getDay();
  let ps;if(p===0)ps=7;else if(p===6)ps=1;else ps=1+(6-p);
  if(d<=ps)return 1;
  return 2+Math.floor((d-ps-2)/7);
}
function getRangoSem(sem,y,mo){
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dias=new Date(y,mo+1,0).getDate();
  let mn=99,mx=0;
  for(let d=1;d<=dias;d++){
    const fs=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(getSemanaDelMes(fs)===sem){mn=Math.min(mn,d);mx=Math.max(mx,d);}
  }
  const f0=new Date(y,mo,mn),f1=new Date(y,mo,mx);
  return`${f0.getDate()} ${m[f0.getMonth()]} - ${f1.getDate()} ${m[f1.getMonth()]}`;
}
function destroyCharts(){CHARTS.forEach(c=>{try{c.destroy();}catch(e){}});CHARTS=[];}

// Plugins
const topLbl={id:'topLbl',afterDatasetsDraw(chart){
  if(!chart.config.options._tots)return;
  const{ctx}=chart;const tots=chart.config.options._tots;const nDs=chart.data.datasets.length;
  ctx.save();ctx.font='600 11px Inter,sans-serif';ctx.fillStyle='#1A1D2E';ctx.textAlign='center';ctx.textBaseline='bottom';
  tots.forEach((t,i)=>{
    if(!t)return;
    let topY=Infinity;
    for(let di=0;di<nDs;di++){const m=chart.getDatasetMeta(di);if(m.data[i]&&m.data[i].y<topY)topY=m.data[i].y;}
    ctx.fillText(fmtK(t),chart.getDatasetMeta(0).data[i].x,topY-5);
  });
  ctx.restore();
}};
const segPct={id:'segPct',afterDatasetsDraw(chart){
  if(!chart.config.options._tots)return;
  const{ctx}=chart;const tots=chart.config.options._tots;
  ctx.save();
  chart.data.datasets.forEach((ds,di)=>{
    const meta=chart.getDatasetMeta(di);
    meta.data.forEach((bar,bi)=>{
      const v=ds.data[bi];if(!v||v<1)return;
      const p=Math.round(v/tots[bi]*100);if(p<6)return;
      const h=bar.height||0;if(h<18)return;
      ctx.font='500 10px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p+'%',bar.x,bar.y+h/2);
    });
  });
  ctx.restore();
}};
const hBarLbl={id:'hBarLbl',afterDatasetsDraw(chart){
  if(!chart.config.options._hbar)return;
  const{ctx,data}=chart;
  const tot=data.datasets[0].data.reduce((a,b)=>a+b,0);
  const meta=chart.getDatasetMeta(0);
  ctx.save();ctx.font='500 11px Inter,sans-serif';ctx.fillStyle='#6B7080';ctx.textAlign='left';ctx.textBaseline='middle';
  meta.data.forEach((bar,i)=>{
    const v=data.datasets[0].data[i];
    ctx.fillText(`${fmt(v)}   ${(v/tot*100).toFixed(1)}%`,bar.x+8,bar.y);
  });
  ctx.restore();
}};
Chart.register(topLbl,segPct,hBarLbl);

function buildLine(id,byDay,color){
  const el=document.getElementById(id);if(!el)return;
  const fs=Object.keys(byDay).sort(),vals=fs.map(f=>byDay[f]);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const c=new Chart(el,{type:'line',data:{labels:fs.map(makeLabel),datasets:[
    {label:'Ventas',data:vals,borderColor:color,backgroundColor:color+'18',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,fill:true,tension:0.35},
    {label:'Promedio',data:Array(vals.length).fill(Math.round(avg)),borderColor:'rgba(107,112,128,0.4)',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)}}},
    scales:{x:{grid:{display:false},ticks:{color:'#6B7080',font:{size:11},maxRotation:45}},y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6B7080',font:{size:11},callback:v=>fmtK(v)}}}}});
  CHARTS.push(c);
}
function buildHBar(id,items,colors){
  const el=document.getElementById(id);if(!el)return;
  const h=Math.max(180,items.length*42+60);
  el.style.height=h+'px';
  el.parentElement.style.height=h+'px';
  const c=new Chart(el,{type:'bar',data:{labels:items.map(x=>x[0]),datasets:[{data:items.map(x=>x[1]),backgroundColor:colors,borderRadius:4,barPercentage:.75}]},
    options:{_hbar:true,indexAxis:'y',responsive:true,maintainAspectRatio:false,layout:{padding:{right:220}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.x)}}},
      scales:{x:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#6B7080',font:{size:11},callback:v=>fmtK(v)}},y:{grid:{display:false},ticks:{color:'#1A1D2E',font:{size:12}}}}}});
  CHARTS.push(c);
}
function buildStacked(id,legId,diasData,vends,colors,tots){
  const el=document.getElementById(id);if(!el)return;
  const fs=Object.keys(diasData).sort();
  const totals=tots||fs.map(f=>Object.values(diasData[f]).reduce((a,b)=>a+b,0));
  const activeV=vends.filter(v=>fs.some(f=>(diasData[f][v]||0)>0));
  const datasets=activeV.map((v,vi)=>({label:v,data:fs.map(f=>diasData[f][v]||0),backgroundColor:colors[vi%colors.length],borderRadius:2,stack:'s'}));
  const legEl=document.getElementById(legId);
  if(legEl)legEl.innerHTML=activeV.map((v,vi)=>`<span class="legend-i"><span class="legend-d" style="background:${colors[vi%colors.length]};"></span>${v}</span>`).join('');
  el.parentElement.style.height=Math.max(180,fs.length>5?240:200)+'px';
  const c=new Chart(el,{plugins:[topLbl,segPct],data:{labels:fs.map(makeLabel),datasets},
    options:{_tots:totals,responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;if(!v)return null;return`${ctx.dataset.label}: ${fmt(v)} (${(v/totals[ctx.dataIndex]*100).toFixed(1)}%)`;
      }}}},
      scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#6B7080',font:{size:11}}},y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'},beginAtZero:true,ticks:{color:'#6B7080',font:{size:11},callback:v=>fmtK(v)}}}}});
  CHARTS.push(c);
}

function render(mes){
  destroyCharts();
  const[y,mo]=mes.split('-');
  const year=+y,month=+mo-1;
  const porMes=D.porMes||{},devMap=D.devMap||{},seg=D.seguimiento?.[mes]||{};

  // Totales
  const totCat={},devCat={},netoCat={};
  CATS.forEach(c=>{
    totCat[c]=Object.values((porMes[mes]||{})[c]||{}).reduce((s,v)=>s+v,0);
    devCat[c]=devMap[mes+'|CAT|'+c]||0;
    netoCat[c]=totCat[c]-devCat[c];
  });
  const totalFac=CATS.reduce((s,c)=>s+totCat[c],0);
  const totalDev=devMap[mes]||0;

  // Sort by weight
  const catsSorted=CATS.slice().sort((a,b)=>totCat[b]-totCat[a]);

  document.getElementById('updLbl').innerHTML=
    `Actualizado: ${new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'})}<br><b>Total facturado: ${fmt(totalFac)}</b>`;

  let html=`<div class="mrow">
    ${catsSorted.map(c=>{
      const pd=totCat[c]>0?(devCat[c]/totCat[c]*100).toFixed(1):'0.0';
      const ok=parseFloat(pd)<=3;
      return`<div class="mc">
        <div class="mc-lbl">${CAT_LBL[c]}</div>
        <div class="mc-val" style="color:${CAT_COL[c]}">${fmt(netoCat[c])}</div>
        <div class="mc-sub">Facturado: ${fmt(totCat[c])}</div>
        ${devCat[c]>0?`<div class="mc-dev ${ok?'ok':'warn'}">Dev: -${fmt(devCat[c])} (${pd}%)</div>`:''}
      </div>`;
    }).join('')}
    <div class="mc">
      <div class="mc-lbl">Total neto</div>
      <div class="mc-val">${fmt(totalFac-totalDev)}</div>
      <div class="mc-sub">Facturado: ${fmt(totalFac)}</div>
      ${totalDev>0?`<div class="mc-dev ${(totalDev/totalFac*100)<=3?'ok':'warn'}">Dev: -${fmt(totalDev)} (${(totalDev/totalFac*100).toFixed(1)}%)</div>`:''}
    </div>
  </div>
  <div class="tab-bar">
    ${catsSorted.map((c,i)=>`<button class="tab${i===0?' active':''}" onclick="switchTab('${c}',this)">${CAT_LBL[c]}</button>`).join('')}
    <button class="tab" onclick="switchTab('marcas',this)">Marcas</button>
    <button class="tab" onclick="switchTab('detailing',this)">Detailing</button>
    <button class="tab" onclick="switchTab('audio',this)">CarAudio</button>
    <button class="tab" onclick="switchTab('seguimiento',this)">Seguimiento</button>
    <button class="tab" onclick="switchTab('devoluciones',this)">Devoluciones</button>
  </div>`;

  // ── PESTAÑAS CATEGORÍA ──
  catsSorted.forEach((cat,ci)=>{
    const vends=(porMes[mes]||{})[cat]||{};
    const vendList=Object.entries(vends).sort((a,b)=>b[1]-a[1]);
    const byDay={};
    Object.keys(seg).forEach(f=>{const v=segVal(mes,f,cat);if(v>0)byDay[f]=v;});
    const devTot=devCat[cat]||0;
    const pDev=totCat[cat]>0?(devTot/totCat[cat]*100).toFixed(1):'0.0';

    // Semanas
    const bySem={};
    Object.keys(byDay).forEach(f=>{const s=getSemanaDelMes(f);if(s){if(!bySem[s])bySem[s]=[];bySem[s].push(f);}});

    let semHtml='';
    Object.entries(bySem).sort((a,b)=>+a[0]-+b[0]).forEach(([sem,fechas])=>{
      const rango=getRangoSem(+sem,year,month);
      const semTot=fechas.reduce((s,f)=>s+(byDay[f]||0),0);
      semHtml+=`<div class="sem-blk">
        <div class="sem-hdr"><b>Semana ${sem}</b><span>${rango}</span><span class="sem-tot" style="color:${CAT_COL[cat]}">${fmt(semTot)}</span></div>
        <div class="legend" id="leg_${cat}_${sem}"></div>
        <div style="position:relative;width:100%;min-height:200px;"><canvas id="stk_${cat}_${sem}"></canvas></div>
      </div>`;
    });

    html+=`<div class="tab-panel${ci===0?' active':''}" id="panel-${cat}">
      <div class="mrow" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr));">
        <div class="mc"><div class="mc-lbl">Facturado</div><div class="mc-val" style="color:${CAT_COL[cat]}">${fmt(totCat[cat])}</div></div>
        <div class="mc"><div class="mc-lbl">Devuelto</div><div class="mc-val">${fmt(devTot)}</div><div class="mc-sub"><span class="badge ${parseFloat(pDev)<=3?'ok':'warn'}">${pDev}%</span></div></div>
        <div class="mc"><div class="mc-lbl">Neto real</div><div class="mc-val">${fmt(totCat[cat]-devTot)}</div></div>
        <div class="mc"><div class="mc-lbl">Dias activos</div><div class="mc-val">${Object.keys(byDay).length}</div></div>
        <div class="mc"><div class="mc-lbl">Promedio diario</div><div class="mc-val">${Object.keys(byDay).length?fmt(totCat[cat]/Object.keys(byDay).length):'—'}</div></div>
      </div>
      <div class="sec">Evolucion diaria</div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="line_${cat}"></canvas></div>
      <div class="sec">Por vendedor</div>
      <div style="position:relative;width:100%;min-height:200px;"><canvas id="hbar_${cat}"></canvas></div>
      <div class="sec">Detalle por vendedor</div>
      <div class="tw"><table class="tbl">
        <thead><tr><th>Vendedor</th><th>Facturado</th><th>Devuelto</th><th>% Dev</th><th>Neto</th></tr></thead>
        <tbody>
        ${vendList.map(([v,n])=>{
          const dv=devMap[mes+'|VEND|'+v]||0;const p=n>0?(dv/n*100).toFixed(1):'0.0';const ok=parseFloat(p)<=3;
          return`<tr><td>${v}</td><td>${fmt(n)}</td>
            <td>${dv>0?`<span style="color:${ok?'var(--green)':'var(--red)'}">${fmt(dv)}</span>`:`<span class="zero">—</span>`}</td>
            <td>${dv>0?`<span class="badge ${ok?'ok':'warn'}">${p}%</span>`:`<span class="zero">—</span>`}</td>
            <td style="font-weight:600">${fmt(n-dv)}</td></tr>`;
        }).join('')}
        <tr class="tr-tot"><td>Total</td><td>${fmt(totCat[cat])}</td><td>${fmt(devTot)}</td>
          <td><span class="badge ${parseFloat(pDev)<=3?'ok':'warn'}">${pDev}%</span></td>
          <td>${fmt(totCat[cat]-devTot)}</td></tr>
        </tbody>
      </table></div>
      <div class="sec">Desglose semanal</div>
      ${semHtml}
    </div>`;
  });

  // ── MARCAS ──
  const marcasMes=D.marcasMes?.[mes]||{};
  const allVendsSorted=Object.keys(marcasMes).sort((a,b)=>{
    const ta=Object.values(marcasMes[a]).reduce((s,v)=>s+(v.neto||0),0);
    const tb=Object.values(marcasMes[b]).reduce((s,v)=>s+(v.neto||0),0);
    return tb-ta;
  });
  html+=`<div class="tab-panel" id="panel-marcas">
    <div class="filter-row">
      <label>Filtrar por vendedor:</label>
      <select id="vendFilter" onchange="filtrarMarcas()">
        <option value="">Todos</option>
        ${allVendsSorted.map(v=>`<option value="${v}">${v}</option>`).join('')}
      </select>
    </div>
    <div id="marcas-tbl"></div>
  </div>`;

  // ── DETAILING ──
  const detMes=D.detailing?.[mes]||{tipo:{},instalador:{}};
  const totalDet=Object.values(detMes.tipo||{}).reduce((s,v)=>s+v,0);
  const tipoLbl={PPF:'PPF',Ceramico:'Ceramico',PapelAhumado:'Papel Ahumado'};
  html+=`<div class="tab-panel" id="panel-detailing">
    <div class="sec">Por tipo de servicio</div>
    <div class="card-grid">
      ${Object.entries(detMes.tipo||{}).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`
        <div class="card"><div class="card-lbl">${tipoLbl[t]||t}</div>
        <div class="card-val">${fmt(n)}</div>
        <div class="card-sub">${totalDet>0?(n/totalDet*100).toFixed(1)+'% del total':''}</div></div>`).join('')}
    </div>
    <div class="sec">Por instalador</div>
    <div class="tw"><table class="tbl">
      <thead><tr><th>Instalador</th><th>Monto</th><th>% del total</th></tr></thead>
      <tbody>
        ${Object.entries(detMes.instalador||{}).sort((a,b)=>b[1]-a[1]).map(([inst,n])=>{
          const lbl={'INST-ALEX':'Alexander Perez (Papel Ahumado)','INST-CDIN':'Carlos Dinis (Ceramico)','INST-ANTH':'Anthony Cardenas (PPF/Ceramico)'};
          return`<tr><td>${lbl[inst]||inst}</td><td>${fmt(n)}</td><td>${totalDet>0?(n/totalDet*100).toFixed(1)+'%':'—'}</td></tr>`;
        }).join('')}
        <tr class="tr-tot"><td>Total Detailing</td><td>${fmt(totalDet)}</td><td>100%</td></tr>
      </tbody>
    </table></div>
  </div>`;

  // ── CARAUDIO ──
  const audioMes=D.audioMes?.[mes]||{};
  const AUDIO_REAL=new Set(['JL AUDIO','KENWOOD','Kenwood','Rockford','Alpine','DS18','Pioneer','Boss Audio','STINGER','Stinger','BTL']);
  const audioFilt={};
  Object.entries(audioMes).forEach(([m,v])=>{if(AUDIO_REAL.has(m)&&(v.neto||0)>0)audioFilt[m]=v;});
  const totalAudio=Object.values(audioFilt).reduce((s,v)=>s+(v.neto||0),0);
  html+=`<div class="tab-panel" id="panel-audio">
    <div class="mc" style="max-width:220px;margin-bottom:1.5rem;">
      <div class="mc-lbl">Total CarAudio</div>
      <div class="mc-val" style="color:var(--ml)">${fmt(totalAudio)}</div>
      <div class="mc-sub">${mesLabel(mes)}</div>
    </div>
    <div class="sec">Por marca</div>
    <div class="card-grid">
      ${Object.entries(audioFilt).sort((a,b)=>b[1].neto-a[1].neto).map(([marca,v])=>`
        <div class="card"><div class="card-lbl">${marca}</div>
        <div class="card-val">${fmt(v.neto)}</div>
        <div class="card-sub">${Math.round(v.cant)} unidades · ${totalAudio>0?(v.neto/totalAudio*100).toFixed(1)+'%':''}</div>
        </div>`).join('')}
    </div>
    <div class="tw"><table class="tbl">
      <thead><tr><th>Marca</th><th>Unidades</th><th>Facturado</th><th>% del total</th></tr></thead>
      <tbody>
        ${Object.entries(audioFilt).sort((a,b)=>b[1].neto-a[1].neto).map(([m,v])=>`
          <tr><td>${m}</td><td style="text-align:right">${Math.round(v.cant)}</td><td>${fmt(v.neto)}</td>
          <td>${totalAudio>0?(v.neto/totalAudio*100).toFixed(1)+'%':'—'}</td></tr>`).join('')}
        <tr class="tr-tot"><td>Total</td><td>${Object.values(audioFilt).reduce((s,v)=>s+Math.round(v.cant),0)}</td>
          <td>${fmt(totalAudio)}</td><td>100%</td></tr>
      </tbody>
    </table></div>
  </div>`;

  // ── SEGUIMIENTO ──
  const fechasSeg=Object.keys(seg).filter(f=>CATS.some(c=>segVal(mes,f,c)>0)).sort();
  const bySemSeg={};
  fechasSeg.forEach(f=>{const s=getSemanaDelMes(f);if(s){if(!bySemSeg[s])bySemSeg[s]=[];bySemSeg[s].push(f);}});
  const catsSeg=catsSorted;

  let segHtml=`<div class="tw">`;
  Object.entries(bySemSeg).sort((a,b)=>+a[0]-+b[0]).forEach(([sem,fechas])=>{
    const rango=getRangoSem(+sem,year,month);
    const semTots={};catsSeg.forEach(c=>semTots[c]=0);
    segHtml+=`<div class="sem-blk">
      <div class="sem-hdr"><b>Semana ${sem}</b><span>${rango}</span>
        <span class="sem-tot">${fmt(fechas.reduce((s,f)=>s+catsSeg.reduce((ss,c)=>ss+segVal(mes,f,c),0),0))}</span>
      </div>
      <table class="tbl"><thead><tr>
        <th>Fecha</th>
        ${catsSeg.map(c=>`<th style="color:${CAT_COL[c]}">${CAT_LBL[c]}</th>`).join('')}
        <th>Total</th>
      </tr></thead><tbody>`;
    fechas.forEach(f=>{
      const rowTot=catsSeg.reduce((s,c)=>s+segVal(mes,f,c),0);
      catsSeg.forEach(c=>semTots[c]+=segVal(mes,f,c));
      const dt=new Date(f+'T12:00:00');
      const dl=(diasEs[dt.toLocaleDateString('en-US',{weekday:'short'}).slice(0,3)]||'?')+' '+dt.getDate();
      const ml=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][dt.getMonth()];
      segHtml+=`<tr><td>${dl} ${ml}</td>
        ${catsSeg.map(c=>{const v=segVal(mes,f,c);return v>0?`<td>${fmt(v)}</td>`:`<td class="zero">—</td>`;}).join('')}
        <td style="font-weight:600">${fmt(rowTot)}</td></tr>`;
    });
    const semTot=catsSeg.reduce((s,c)=>s+semTots[c],0);
    segHtml+=`<tr class="tr-sub"><td>Subtotal Sem ${sem}</td>
      ${catsSeg.map(c=>`<td>${fmt(semTots[c])}</td>`).join('')}
      <td>${fmt(semTot)}</td></tr>
    </tbody></table></div>`;
  });
  const mesTots={};catsSeg.forEach(c=>mesTots[c]=0);
  fechasSeg.forEach(f=>catsSeg.forEach(c=>mesTots[c]+=segVal(mes,f,c)));
  segHtml+=`<table class="tbl" style="margin-top:4px;"><tbody><tr class="tr-tot">
    <td>TOTAL ${mesLabel(mes).toUpperCase()}</td>
    ${catsSeg.map(c=>`<td>${fmt(mesTots[c])}</td>`).join('')}
    <td>${fmt(catsSeg.reduce((s,c)=>s+mesTots[c],0))}</td>
  </tr></tbody></table></div>`;
  html+=`<div class="tab-panel" id="panel-seguimiento">${segHtml}</div>`;

  // ── DEVOLUCIONES ──
  const razones={};
  Object.keys(devMap).forEach(k=>{
    if(k.startsWith(mes+'|RAZ|')){const r=k.slice((mes+'|RAZ|').length);razones[r]=(razones[r]||0)+devMap[k];}
  });
  const totalDevAll=devMap[mes]||0;
  const razonColors=['#0F766E','#1D4ED8','#6D28D9','#92400E','#B45309','#D97706','#059669','#DC2626'];
  const razonEntries=Object.entries(razones).sort((a,b)=>b[1]-a[1]);

  const allVendsDev={};
  CATS.forEach(c=>Object.entries((porMes[mes]||{})[c]||{}).forEach(([v,n])=>{
    if(!allVendsDev[v])allVendsDev[v]={fac:0,dev:0};
    allVendsDev[v].fac+=n;
    allVendsDev[v].dev+=devMap[mes+'|VEND|'+v]||0;
  }));

  const mesesDisp=(D.meses||[]).slice().reverse();

  html+=`<div class="tab-panel" id="panel-devoluciones">
    <div class="mrow" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:1.5rem;">
      <div class="mc"><div class="mc-lbl">Total devuelto</div><div class="mc-val" style="color:var(--red)">${fmt(totalDevAll)}</div></div>
      <div class="mc"><div class="mc-lbl">Total facturado</div><div class="mc-val">${fmt(totalFac)}</div></div>
      <div class="mc"><div class="mc-lbl">% global</div>
        <div class="mc-val"><span class="badge ${totalFac>0&&(totalDevAll/totalFac*100)<=3?'ok':'warn'}">${totalFac>0?(totalDevAll/totalFac*100).toFixed(1)+'%':'—'}</span></div>
      </div>
    </div>
    ${razonEntries.length?`
    <div class="sec">Por razon de devolucion</div>
    <div class="donut-grid">
      <div style="position:relative;height:220px;"><canvas id="donut_dev"></canvas></div>
      <div class="donut-legend">
        ${razonEntries.map(([r,n],i)=>`<div class="donut-item">
          <span class="donut-dot" style="background:${razonColors[i%razonColors.length]};border-radius:3px;width:12px;height:12px;flex-shrink:0;"></span>
          <span style="font-weight:500">${r}</span>
          <span style="margin-left:auto;color:var(--muted)">${fmt(n)} (${totalDevAll>0?(n/totalDevAll*100).toFixed(1)+'%':'—'})</span>
        </div>`).join('')}
      </div>
    </div>`:''}
    <div class="sec">Por vendedor</div>
    <div class="tw"><table class="tbl">
      <thead><tr><th>Vendedor</th><th>Facturado</th><th>Devuelto</th><th>% Dev</th><th>Meta 3%</th></tr></thead>
      <tbody>
      ${Object.entries(allVendsDev).sort((a,b)=>b[1].fac-a[1].fac).map(([v,{fac,dev}])=>{
        const p=fac>0?(dev/fac*100).toFixed(1):'0.0';const ok=parseFloat(p)<=3;
        return`<tr><td>${v}</td><td>${fmt(fac)}</td>
          <td>${dev>0?fmt(dev):`<span class="zero">—</span>`}</td>
          <td>${dev>0?`<span class="badge ${ok?'ok':'warn'}">${p}%</span>`:`<span class="zero">—</span>`}</td>
          <td>${dev>0?`<b style="color:${ok?'var(--green)':'var(--red)'}">${ok?'OK':'Alto'}</b>`:'—'}</td></tr>`;
      }).join('')}
      </tbody>
    </table></div>
    ${mesesDisp.length>=2?`
    <div class="sec">Historico por vendedor</div>
    <div class="tw"><table class="tbl">
      <thead><tr><th>Vendedor</th>
        ${mesesDisp.map(m=>`<th>${mesLabel(m)}</th>`).join('')}
        <th>Promedio</th>
      </tr></thead><tbody>
      ${[...new Set(mesesDisp.flatMap(m=>CATS.flatMap(c=>Object.keys((D.porMes[m]||{})[c]||{}))))].map(v=>{
        const pcts=mesesDisp.map(m=>{
          const fac=CATS.reduce((s,c)=>s+((D.porMes[m]||{})[c]?.[v]||0),0);
          const dev=D.devMap[m+'|VEND|'+v]||0;
          return fac>0?(dev/fac*100):null;
        });
        const valid=pcts.filter(p=>p!==null);
        if(!valid.length)return'';
        const avg=valid.reduce((s,p)=>s+p,0)/valid.length;
        return`<tr><td>${v}</td>
          ${pcts.map(p=>p===null?`<td class="zero">—</td>`:`<td><span class="badge ${p<=3?'ok':'warn'}">${p.toFixed(1)}%</span></td>`).join('')}
          <td><span class="badge ${avg<=3?'ok':'warn'}">${avg.toFixed(1)}%</span></td></tr>`;
      }).join('')}
      </tbody>
    </table></div>`:''}
  </div>`;

  document.getElementById('app').innerHTML=html;

  requestAnimationFrame(()=>{
    // Build all charts
    catsSorted.forEach(cat=>{
      const byDay={};
      Object.keys(seg).forEach(f=>{const v=segVal(mes,f,cat);if(v>0)byDay[f]=v;});
      console.log('cat:',cat,'byDay keys:',Object.keys(byDay).length,'line el:',document.getElementById('line_'+cat));
      if(Object.keys(byDay).length) buildLine('line_'+cat,byDay,CAT_COL[cat]);

      const vends=(porMes[mes]||{})[cat]||{};
      const vendList=Object.entries(vends).sort((a,b)=>b[1]-a[1]);
      if(vendList.length) buildHBar('hbar_'+cat,vendList,CAT_SHADES[cat]);

      const bySem={};
      Object.keys(byDay).forEach(f=>{const s=getSemanaDelMes(f);if(s){if(!bySem[s])bySem[s]=[];bySem[s].push(f);}});
      Object.entries(bySem).forEach(([sem,fechas])=>{
        const diasData={};
        fechas.forEach(f=>{
          diasData[f]={};
          const vd=D.seguimiento?.[mes]?.[f]?.vend?.[cat]||{};
          Object.entries(vd).forEach(([v,n])=>{if(n>0)diasData[f][v]=n;});
        });
        const tots=fechas.map(f=>byDay[f]||0);
        buildStacked(`stk_${cat}_${sem}`,`leg_${cat}_${sem}`,diasData,vendList.map(x=>x[0]),CAT_SHADES[cat],tots);
      });
    });

    // Donut
    const donutEl=document.getElementById('donut_dev');
    if(donutEl&&razonEntries.length){
      const c=new Chart(donutEl,{type:'doughnut',
        data:{labels:razonEntries.map(x=>x[0]),datasets:[{data:razonEntries.map(x=>x[1]),backgroundColor:razonColors,borderWidth:2,borderColor:'#fff'}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.parsed)}`}}}}});
      CHARTS.push(c);
    }

    filtrarMarcas();
  });
}

function filtrarMarcas(){
  const mes=document.getElementById('mesSelect')?.value;
  if(!mes||!D)return;
  const vendFilter=document.getElementById('vendFilter')?.value||'';
  const marcasMes=D.marcasMes?.[mes]||{};
  const allVends=vendFilter?[vendFilter]:Object.keys(marcasMes).sort((a,b)=>{
    return Object.values(marcasMes[b]).reduce((s,v)=>s+(v.neto||0),0)-Object.values(marcasMes[a]).reduce((s,v)=>s+(v.neto||0),0);
  });
  const agg={};
  allVends.forEach(v=>Object.entries(marcasMes[v]||{}).forEach(([m,{neto,cant}])=>{
    if(!agg[m])agg[m]={neto:0,cant:0,vends:{}};
    agg[m].neto+=neto;agg[m].cant+=cant;
    agg[m].vends[v]=(agg[m].vends[v]||0)+neto;
  }));
  const sorted=Object.entries(agg).sort((a,b)=>b[1].neto-a[1].neto);
  const total=sorted.reduce((s,[,v])=>s+v.neto,0);
  const MCOLS=['#0F766E','#1D4ED8','#6D28D9','#92400E','#B45309','#D97706','#059669','#DC2626','#0369A1','#0891B2','#065F46','#4C1D95'];

  let html=`<div class="tw"><table class="tbl">
    <thead><tr><th>Marca</th><th>Unidades</th><th>Facturado</th><th>% del total</th>${vendFilter?'':`<th>Vendedores</th>`}</tr></thead>
    <tbody>`;
  sorted.forEach(([marca,{neto,cant,vends}],i)=>{
    const col=MCOLS[i%MCOLS.length];
    const pct=total>0?(neto/total*100).toFixed(1):0;
    const vendStr=Object.entries(vends).sort((a,b)=>b[1]-a[1]).map(([v,n])=>`${v} (${fmt(n)})`).join(' · ');
    html+=`<tr>
      <td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${col};margin-right:6px;vertical-align:middle;"></span>${marca}</td>
      <td style="text-align:right">${Math.round(cant)}</td>
      <td>${fmt(neto)}</td>
      <td><div style="display:flex;align-items:center;gap:6px;">
        <div style="width:${Math.min(Math.round(parseFloat(pct)),80)}px;height:6px;background:${col};border-radius:3px;"></div>
        ${pct}%</div></td>
      ${vendFilter?'':`<td style="font-size:11px;color:var(--muted);white-space:normal;max-width:280px;">${vendStr}</td>`}
    </tr>`;
  });
  html+=`<tr class="tr-tot"><td>Total</td><td>${sorted.reduce((s,[,v])=>s+Math.round(v.cant),0)}</td><td>${fmt(total)}</td><td>100%</td>${vendFilter?'':`<td></td>`}</tr>
  </tbody></table></div>`;
  const el=document.getElementById('marcas-tbl');
  if(el)el.innerHTML=html;
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function cambiarMes(){
  const mes=document.getElementById('mesSelect').value;
  if(mes&&D)render(mes);
}

async function boot(){
  try{
    const resp=await fetch(DATA_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    D=data;
    const meses=D.meses||[];
    if(!meses.length)throw new Error('Sin datos');
    const sel=document.getElementById('mesSelect');
    sel.innerHTML=meses.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    render(meses[0]);
  }catch(e){
    document.getElementById('loading').style.display='none';
    const el=document.getElementById('err');
    el.style.display='block';
    el.textContent='Error: '+e.message;
  }
}
boot();
</script>
</body>
</html>
